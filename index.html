<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <p class="title">Rock Paper Scissors</p>
    <button class="move-button" onclick="playGame('Rock')"><img src="./emoji/rock-emoji.png" class="move-icon"></button>

    <button class="move-button" onclick="playGame('Paper')"><img src="./emoji/paper-emoji.png"
            class="move-icon"></button>

    <button class="move-button" onclick="playGame('Scissors')"><img src="./emoji/scissors-emoji.png"
            class="move-icon"></button>

    <p class="js-result result"></p>
    <p class="js-why "></p>
    <p class="js-score score"></p>
    <button class="reset-score" onclick="restScore();">Reset Score</button>
    <script>
        updateScore();
    </script>
</body>

</html>
